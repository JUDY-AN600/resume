<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" role="img" aria-labelledby="title desc">
  <title id="title">流动色彩动态海报</title>
  <desc id="desc">由雾蓝、鼠尾草绿、陶土色和浅紫色组成的抽象动态画面。</desc>
  <defs>
    <filter id="blur"><feGaussianBlur stdDeviation="52"/></filter>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="fade"><feFuncA type="table" tableValues="0 0.13"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="fade" mode="soft-light"/>
    </filter>
    <clipPath id="frame"><rect x="0" y="0" width="900" height="1100" rx="4"/></clipPath>
  </defs>
  <g clip-path="url(#frame)" filter="url(#grain)">
    <rect width="900" height="1100" fill="#d8cfc3"/>
    <g filter="url(#blur)">
      <circle cx="170" cy="220" r="300" fill="#b8c4b5">
        <animate attributeName="cx" values="170;360;170" dur="11s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="220;120;220" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="760" cy="300" r="320" fill="#bdc8d3">
        <animate attributeName="cx" values="760;560;760" dur="13s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="300;470;300" dur="10s" repeatCount="indefinite"/>
      </circle>
      <circle cx="260" cy="910" r="350" fill="#d7b9ac">
        <animate attributeName="cx" values="260;430;260" dur="14s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="910;760;910" dur="12s" repeatCount="indefinite"/>
      </circle>
      <circle cx="760" cy="900" r="280" fill="#c6bdd2">
        <animate attributeName="cx" values="760;650;760" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="900;1030;900" dur="15s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g fill="none" stroke="#191919" opacity=".34">
      <ellipse cx="450" cy="550" rx="235" ry="365" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0 450 550" to="360 450 550" dur="28s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="450" cy="550" rx="365" ry="235" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate" from="360 450 550" to="0 450 550" dur="34s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <circle cx="450" cy="550" r="72" fill="none" stroke="#191919" stroke-width="2" opacity=".58">
      <animate attributeName="r" values="58;92;58" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".58;.18;.58" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <text x="55" y="85" font-family="Arial, sans-serif" font-size="17" letter-spacing="7" fill="#191919">AN ZHE / 2026</text>
    <text x="55" y="1022" font-family="Arial, sans-serif" font-size="14" letter-spacing="4" fill="#191919">ORGANIZE · COORDINATE · DELIVER</text>
  </g>
</svg>
